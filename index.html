<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사내 성과 대시보드</title>
  </head>
  <body>
    <div class="dashboard">
      <header class="dashboard-header">
        <h1 class="dashboard-title">사내 성과 대시보드</h1>
        <p class="dashboard-subtitle">팀 주간 성과 모니터링</p>
      </header>

      <section class="filter-section" aria-label="기간 필터">
        <div class="filter-buttons" role="group" aria-label="빠른 기간 선택">
          <button type="button" class="filter-btn" data-days="7">7일</button>
          <button type="button" class="filter-btn" data-days="30">30일</button>
          <button type="button" class="filter-btn" data-days="90">90일</button>
        </div>
      </section>

      <section class="kpi-section" aria-label="주요 지표">
        <div class="kpi-grid">
          <article class="kpi-card" data-kpi="revenue">
            <div class="kpi-header">
              <h2 class="kpi-title">매출</h2>
            </div>
            <div class="kpi-value" aria-live="polite"></div>
            <div class="kpi-change"></div>
            <div class="kpi-label"></div>
          </article>

          <article class="kpi-card" data-kpi="visitors">
            <div class="kpi-header">
              <h2 class="kpi-title">방문자</h2>
            </div>
            <div class="kpi-value" aria-live="polite"></div>
            <div class="kpi-change"></div>
            <div class="kpi-label"></div>
          </article>

          <article class="kpi-card" data-kpi="conversion">
            <div class="kpi-header">
              <h2 class="kpi-title">전환율</h2>
            </div>
            <div class="kpi-value" aria-live="polite"></div>
            <div class="kpi-change"></div>
            <div class="kpi-label"></div>
          </article>

          <article class="kpi-card" data-kpi="new-customers">
            <div class="kpi-header">
              <h2 class="kpi-title">신규고객</h2>
            </div>
            <div class="kpi-value" aria-live="polite"></div>
            <div class="kpi-change"></div>
            <div class="kpi-label"></div>
          </article>
        </div>
      </section>

      <section class="chart-section" aria-labelledby="chart-heading">
        <h2 id="chart-heading" class="chart-title">매출 추이</h2>
        <div class="chart-wrap">
          <canvas id="revenueChart" aria-label="매출 추이 차트"></canvas>
        </div>
      </section>

      <section class="table-section" aria-labelledby="table-heading">
        <h2 id="table-heading" class="table-title">일별 상세</h2>
        <div class="table-wrap">
          <table class="metrics-table">
            <thead>
              <tr>
                <th scope="col">날짜</th>
                <th scope="col">매출</th>
                <th scope="col">방문자</th>
                <th scope="col">전환율</th>
                <th scope="col">신규고객</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </div>
  </body>
</html>
